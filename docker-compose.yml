# ByCC — docker compose up -d --build
#
# 토큰 등록:
#   브라우저에서 http://localhost:44900 접속 → "Login with Claude" 또는 Tokens 페이지에서 추가

services:
  bycc:
    build: .
    ports:
      - "44900:44900"
    volumes:
      - ./data:/app/data
    environment:
      NODE_ENV: development
      HOST: "0.0.0.0"
      PORT: "44900"
      LR: remote
      DB_HOST: host.docker.internal
      DB_PORT: ${DB_PORT:-5444}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-1234}
      DB_NAME: ${DB_NAME:-bycc}
    restart: unless-stopped
